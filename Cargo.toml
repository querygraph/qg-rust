[package]
name = "querygraph"
version = "0.1.0"
edition = "2024"
description = "AI Navigator semantic layer for governed dataset discovery and reuse"
license = "MIT"

[dependencies]
anyhow = "1.0"
bs58 = "0.5"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", features = ["blocking", "json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
thiserror = "2.0"
